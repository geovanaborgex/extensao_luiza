<!-- FORM -->
<div class="form-agendamento">

  <h2>Agendar Horário</h2>

  <form action="salvar_agendamento.php" method="POST">

    <!-- NOME -->
    <div class="form-group">
      <label>Nome</label>
      <input type="text" name="nome" required>
    </div>

    <!-- TELEFONE -->
    <div class="form-group">
      <label>Telefone</label>
      <input type="text" name="telefone" required>
    </div>

    <!-- SERVIÇO -->
    <div class="form-group">
      <label>Serviço</label>

      <select name="servico" id="servico" required onchange="mostrarProcedimentos()">
        <option value="">Selecione</option>

        <option value="maquiagem">Maquiagem</option>
        <option value="cabelos">Cabelos</option>
        <option value="sobrancelhas">Sobrancelhas</option>
        <option value="cuidados">Cuidados</option>
      </select>
    </div>

    <!-- PROCEDIMENTO -->
    <div class="form-group hidden" id="procedimentos-group">

      <label>Procedimento</label>

      <select name="procedimento" id="procedimento" onchange="mostrarInfoProcedimento()">
      </select>

    </div>

    <!-- INFO PROCEDIMENTO -->
    <div class="info-procedimento hidden" id="infoProcedimento">

      <h3 id="nomeProcedimento"></h3>

      <p>
        <i class="fa-regular fa-clock"></i>
        Duração: <span id="duracaoProcedimento"></span>
      </p>

      <p>
        <i class="fa-solid fa-tag"></i>
        Valor: <span id="valorProcedimento"></span>
      </p>

    </div>

    <!-- DATA -->
    <div class="form-group">
      <label>Data</label>
      <input type="date" name="data" required>
    </div>

    <!-- HORÁRIO -->
    <div class="form-group">
      <label>Horário</label>

      <select name="horario" required>
        <option value="">Selecione</option>

        <option>08:00</option>
        <option>09:00</option>
        <option>10:00</option>
        <option>11:00</option>
        <option>13:00</option>
        <option>14:00</option>
        <option>15:00</option>
        <option>16:00</option>
        <option>17:00</option>
      </select>
    </div>

    <center>
      <button type="submit" class="btn-cta">
        Agendar
      </button>
    </center>

  </form>

</div>

<!-- JS -->
<script>

const procedimentosInfo = {

  // MAQUIAGEM
  "Maquiagem Profissional": {
    valor: "R$ 120,00",
    duracao: "1 hora"
  },

  // CABELOS
  "Escova": {
    valor: "R$ 45,00",
    duracao: "30 minutos"
  },

  "Chapa": {
    valor: "R$ 40,00",
    duracao: "1 hora"
  },

  "Cachos/ondas": {
    valor: "R$ 55,00",
    duracao: "30 minutos"
  },

  "Penteado": {
    valor: "R$ 80,00",
    duracao: "30 minutos"
  },

  "Tintura com tinta profissional": {
    valor: "R$ 150,00",
    duracao: "30 minutos"
  },

  // SOBRANCELHAS
  "Nanopigmentação": {
    valor: "R$ 250,00",
    duracao: "2 horas"
  },

  "Design com henna": {
    valor: "R$ 35,00",
    duracao: "30 minutos"
  },

  "Design simples": {
    valor: "R$ 25,00",
    duracao: "30 minutos"
  },

  "Brow Lamination": {
    valor: "R$ 90,00",
    duracao: "1 hora"
  },

  "Cílios - Lash Lifting": {
    valor: "R$ 120,00",
    duracao: "1h30"
  },

  // CUIDADOS
  "Limpeza de pele": {
    valor: "R$ 100,00",
    duracao: "1h15"
  },

  "Spa dos pés": {
    valor: "R$ 70,00",
    duracao: "1 hora"
  }

};

function mostrarProcedimentos(){

  const servico = document.getElementById("servico").value;

  const grupo = document.getElementById("procedimentos-group");

  const procedimento = document.getElementById("procedimento");

  procedimento.innerHTML = "";

  document.getElementById("infoProcedimento").classList.add("hidden");

  // ESCONDE
  if(servico === ""){
    grupo.classList.add("hidden");
    return;
  }

  // MOSTRA
  grupo.classList.remove("hidden");

  // SOBRANCELHAS
  if(servico === "sobrancelhas"){

    procedimento.innerHTML = `
      <option value="">Selecione</option>
      <option>Nanopigmentação</option>
      <option>Design com henna</option>
      <option>Design simples</option>
      <option>Brow Lamination</option>
      <option>Cílios - Lash Lifting</option>
    `;

  }

  // CABELOS
  if(servico === "cabelos"){

    procedimento.innerHTML = `
      <option value="">Selecione</option>
      <option>Escova</option>
      <option>Chapa</option>
      <option>Cachos/ondas</option>
      <option>Penteado</option>
      <option>Tintura com tinta profissional</option>
    `;

  }

  // CUIDADOS
  if(servico === "cuidados"){

    procedimento.innerHTML = `
      <option value="">Selecione</option>
      <option>Limpeza de pele</option>
      <option>Spa dos pés</option>
    `;

  }

  // MAKE
  if(servico === "maquiagem"){

    procedimento.innerHTML = `
      <option value="">Selecione</option>
      <option>Maquiagem Profissional</option>
    `;

  }

}

function mostrarInfoProcedimento(){

  const procedimento = document.getElementById("procedimento").value;

  const infoBox = document.getElementById("infoProcedimento");

  if(procedimento === ""){
    infoBox.classList.add("hidden");
    return;
  }

  const dados = procedimentosInfo[procedimento];

  document.getElementById("duracaoProcedimento").innerText = dados.duracao;

  document.getElementById("valorProcedimento").innerText = dados.valor;

  infoBox.classList.remove("hidden");

}

</script>
