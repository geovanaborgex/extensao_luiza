<!-- FORM -->
<div class="form-agendamento">

<h2>Agendar Horário</h2>

<form action="salvar_agendamento.php" method="POST">

<div class="form-group">
<label>Nome</label>
<input type="text" name="nome" required>
</div>

<div class="form-group">
<label>Telefone</label>
<input type="text" name="telefone" required>
</div>

<div class="form-group">
<label>Serviço</label>
<select name="servico" required>
<option value="">Selecione</option>
<option>Maquiagem</option>
<option>Cabelos</option>
<option>Sobrancelhas</option>
<option>Cuidados</option>
</select>
</div>

<div class="form-group">
<label>Data</label>
<input type="date" name="data" required>
</div>

<div class="form-group">
<label>Horário</label>
<select name="horario" required>
<option value="">Selecione</option>
<option>08:00</option>
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
</select>
</div>

<center><button type="submit" class="btn-cta">Agendar</button></center>

</form>

</div>
